<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insights</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1 class="brand">Insights</h1>
    <nav>Industries | Services | Digital | About</nav>
  </header>

  <main>
    <div class="grid">
      {% for article in articles %}
      <a href="{{ article.link }}" target="_blank" class="card">
        <div class="card-image">
          <img src="{{ article.image }}" alt="{{ article.title }}"
               onerror="this.src='https://placehold.co/400x220/1a1a2e/fff?text=Insight'">
        </div>
        <div class="card-body">
          <span class="tag">{{ article.tag }}</span>
          <h2 class="card-title">{{ article.title }}</h2>
          <p class="card-summary">{{ article.summary }}</p>
        </div>
        <div class="card-meta">
          <span>{{ article.source }}</span>
          <span>{{ article.date[:16] if article.date else '' }}</span>
        </div>
      </a>
      {% endfor %}
    </div>
  </main>
</body>
</html>
